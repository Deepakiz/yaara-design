<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaara Design - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2C2C2C;
            --secondary: #F5F0EB;
            --accent: #D4A574;
            --accent-light: #E8DDD4;
            --background: #FDFBF9;
            --text-primary: #2C2C2C;
            --text-secondary: #6B6B6B;
            --text-light: #FFFFFF;
            --border: #E5E0DB;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: var(--primary);
            color: var(--text-light);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
        }

        .sidebar-logo span {
            color: var(--accent);
            font-size: 12px;
            display: block;
            letter-spacing: 3px;
            margin-top: 4px;
        }

        .sidebar-nav {
            flex: 1;
        }

        .sidebar-link {
            display: block;
            padding: 14px 16px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
        }

        .sidebar-link.active {
            background: var(--accent);
        }

        .main {
            margin-left: 250px;
            padding: 32px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
        }

        .header-stats {
            display: flex;
            gap: 24px;
        }

        .stat-card {
            background: var(--text-light);
            padding: 20px 28px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 600;
            color: var(--accent);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: var(--text-light);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .table th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .table tr:hover {
            background: var(--secondary);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-new {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-contacted {
            background: #fff3e0;
            color: #f57c00;
        }

        .badge-completed {
            background: #e8f5e9;
            color: #388e3c;
        }

        .badge-archived {
            background: #f5f5f5;
            color: #757575;
        }

        .badge-active {
            background: #e8f5e9;
            color: #388e3c;
        }

        .badge-inactive {
            background: #ffebee;
            color: #c62828;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: var(--accent);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--accent-light);
        }

        .btn-danger {
            background: var(--danger);
            color: var(--text-light);
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-info {
            background: var(--info);
            color: var(--text-light);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--text-light);
            padding: 32px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .grid-item {
            background: var(--secondary);
            padding: 20px;
            border-radius: 8px;
        }

        .grid-item-image {
            width: 100%;
            height: 150px;
            background: var(--accent-light);
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            overflow: hidden;
        }

        .grid-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-item-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .grid-item-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .grid-item-actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .loading::after {
            content: '';
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            background: var(--primary);
            color: var(--text-light);
            border-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 16px;
            }

            .sidebar-nav {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .sidebar-link {
                flex: 1;
                min-width: 100px;
                text-align: center;
                margin-bottom: 0;
            }

            .main {
                margin-left: 0;
                padding: 20px;
            }

            .header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .header-stats {
                width: 100%;
                overflow-x: auto;
            }

            .table {
                font-size: 14px;
            }

            .table th,
            .table td {
                padding: 10px 8px;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            YAARA
            <span>Admin Panel</span>
        </div>
        <nav class="sidebar-nav">
            <a class="sidebar-link active" data-section="dashboard">Dashboard</a>
            <a class="sidebar-link" data-section="enquiries">Enquiries</a>
            <a class="sidebar-link" data-section="gallery">Gallery</a>
            <a class="sidebar-link" data-section="services">Services</a>
            <a class="sidebar-link" data-section="testimonials">Testimonials</a>
        </nav>
    </aside>

    <main class="main">
        <!-- Dashboard -->
        <section class="section active" id="dashboard">
            <div class="header">
                <h1>Dashboard</h1>
                <div class="header-stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalEnquiries">0</div>
                        <div class="stat-label">Total Enquiries</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="newEnquiries">0</div>
                        <div class="stat-label">New</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Recent Enquiries</h2>
                </div>
                <div id="recentEnquiries">
                    <div class="loading"></div>
                </div>
            </div>
        </section>

        <!-- Enquiries -->
        <section class="section" id="enquiries">
            <div class="header">
                <h1>Enquiries</h1>
            </div>
            <div class="card">
                <div id="enquiriesList">
                    <div class="loading"></div>
                </div>
            </div>
        </section>

        <!-- Gallery -->
        <section class="section" id="gallery">
            <div class="header">
                <h1>Gallery</h1>
                <button class="btn btn-primary" onclick="openGalleryModal()">+ Add New</button>
            </div>
            <div class="grid" id="galleryList">
                <div class="loading"></div>
            </div>
        </section>

        <!-- Services -->
        <section class="section" id="services">
            <div class="header">
                <h1>Services</h1>
                <button class="btn btn-primary" onclick="openServiceModal()">+ Add New</button>
            </div>
            <div class="card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Icon</th>
                            <th>Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="servicesList">
                        <tr>
                            <td colspan="3">
                                <div class="loading"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Testimonials -->
        <section class="section" id="testimonials">
            <div class="header">
                <h1>Testimonials</h1>
                <button class="btn btn-primary" onclick="openTestimonialModal()">+ Add New</button>
            </div>
            <div class="card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Review</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="testimonialsList">
                        <tr>
                            <td colspan="3">
                                <div class="loading"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Gallery Modal -->
    <div class="modal" id="galleryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add Gallery Item</h2>
                <button class="modal-close" onclick="closeModal('galleryModal')">&times;</button>
            </div>
            <form onsubmit="saveGalleryItem(event)">
                <input type="hidden" id="galleryId">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" class="form-input" id="galleryTitle" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select class="form-select" id="galleryCategory" required>
                        <option value="">Select</option>
                        <option value="custom-outfits">Custom Outfits</option>
                        <option value="designer-wear">Designer Wear</option>
                        <option value="costumes">Costumes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL *</label>
                    <input type="text" class="form-input" id="galleryImage" placeholder="https://..." required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Save</button>
            </form>
        </div>
    </div>

    <!-- Service Modal -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add Service</h2>
                <button class="modal-close" onclick="closeModal('serviceModal')">&times;</button>
            </div>
            <form onsubmit="saveService(event)">
                <input type="hidden" id="serviceId">
                <div class="form-group">
                    <label class="form-label">Name *</label>
                    <input type="text" class="form-input" id="serviceName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Icon (Emoji)</label>
                    <input type="text" class="form-input" id="serviceIcon" value="👗">
                </div>
                <div class="form-group">
                    <label class="form-label">Description *</label>
                    <textarea class="form-textarea" id="serviceDesc" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Save</button>
            </form>
        </div>
    </div>

    <!-- Testimonial Modal -->
    <div class="modal" id="testimonialModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add Testimonial</h2>
                <button class="modal-close" onclick="closeModal('testimonialModal')">&times;</button>
            </div>
            <form onsubmit="saveTestimonial(event)">
                <input type="hidden" id="testimonialId">
                <div class="form-group">
                    <label class="form-label">Name *</label>
                    <input type="text" class="form-input" id="testimonialName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Review *</label>
                    <textarea class="form-textarea" id="testimonialText" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Rating</label>
                    <select class="form-select" id="testimonialRating">
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Save</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = window.location.origin + '/api';

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.querySelectorAll('.sidebar-link').forEach(link => {
            link.addEventListener('click', function () {
                showSection(this.dataset.section);
            });
        });

        function showSection(sectionId) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.querySelector(`[data-section="${sectionId}"]`).classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            if (sectionId === 'dashboard') loadDashboard();
            if (sectionId === 'enquiries') loadEnquiries();
            if (sectionId === 'gallery') loadGallery();
            if (sectionId === 'services') loadServices();
            if (sectionId === 'testimonials') loadTestimonials();
        }

        function openModal(modalId) { document.getElementById(modalId).classList.add('active'); }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            if (modalId === 'galleryModal') {
                document.getElementById('galleryId').value = '';
                document.getElementById('galleryTitle').value = '';
                document.getElementById('galleryCategory').value = '';
                document.getElementById('galleryImage').value = '';
            }
            if (modalId === 'serviceModal') {
                document.getElementById('serviceId').value = '';
                document.getElementById('serviceName').value = '';
                document.getElementById('serviceIcon').value = '👗';
                document.getElementById('serviceDesc').value = '';
            }
            if (modalId === 'testimonialModal') {
                document.getElementById('testimonialId').value = '';
                document.getElementById('testimonialName').value = '';
                document.getElementById('testimonialText').value = '';
                document.getElementById('testimonialRating').value = '5';
            }
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function (e) {
                if (e.target === this) this.classList.remove('active');
            });
        });

        // Dashboard
        async function loadDashboard() {
            try {
                const res = await fetch(`${API_BASE}/enquiries`);
                const result = await res.json();
                if (result.status === 'success') {
                    const enquiries = result.data;
                    document.getElementById('totalEnquiries').textContent = enquiries.length;
                    document.getElementById('newEnquiries').textContent = enquiries.filter(e => e.status === 'new').length;
                    if (enquiries.length === 0) {
                        document.getElementById('recentEnquiries').innerHTML = '<p class="empty-state">No enquiries yet</p>';
                    } else {
                        document.getElementById('recentEnquiries').innerHTML = `
                            <table class="table">
                                <thead><tr><th>Name</th><th>Service</th><th>Status</th><th>Date</th></tr></thead>
                                <tbody>
                                    ${enquiries.slice(0, 5).map(e => `
                                        <tr>
                                            <td>${e.name}<br><small>${e.phone || ''}</small></td>
                                            <td>${e.service || '-'}</td>
                                            <td><span class="badge badge-${e.status}">${e.status}</span></td>
                                            <td>${new Date(e.createdAt).toLocaleDateString()}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>`;
                    }
                }
            } catch (error) { console.error(error); }
        }

        // Enquiries
        async function loadEnquiries() {
            try {
                const res = await fetch(`${API_BASE}/enquiries`);
                const result = await res.json();
                if (result.status === 'success') {
                    const enquiries = result.data;
                    if (enquiries.length === 0) {
                        document.getElementById('enquiriesList').innerHTML = '<p class="empty-state">No enquiries</p>';
                    } else {
                        document.getElementById('enquiriesList').innerHTML = `
                            <table class="table">
                                <thead><tr><th>Name</th><th>Phone</th><th>Message</th><th>Status</th><th>Actions</th></tr></thead>
                                <tbody>
                                    ${enquiries.map(e => `
                                        <tr>
                                            <td>${e.name}</td>
                                            <td>${e.phone || '-'}</td>
                                            <td>${e.message ? e.message.substring(0, 30) + '...' : '-'}</td>
                                            <td><span class="badge badge-${e.status}">${e.status}</span></td>
                                            <td>
                                                <select style="width:auto;padding:4px;font-size:12px;" onchange="updateEnquiryStatus('${e.id}', this.value)">
                                                    <option value="new" ${e.status === 'new' ? 'selected' : ''}>New</option>
                                                    <option value="contacted" ${e.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                                                    <option value="completed" ${e.status === 'completed' ? 'selected' : ''}>Completed</option>
                                                </select>
                                                <button class="btn btn-danger btn-sm" onclick="deleteEnquiry('${e.id}')">Delete</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>`;
                    }
                }
            } catch (error) { console.error(error); }
        }

        async function updateEnquiryStatus(id, status) {
            try {
                await fetch(`${API_BASE}/enquiries/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                showToast('Status updated');
                loadEnquiries();
            } catch (error) { showToast('Error updating', 'error'); }
        }

        async function deleteEnquiry(id) {
            if (confirm('Delete this enquiry?')) {
                try {
                    await fetch(`${API_BASE}/enquiries/${id}`, { method: 'DELETE' });
                    showToast('Deleted');
                    loadEnquiries();
                } catch (error) { showToast('Error deleting', 'error'); }
            }
        }

        // Gallery
        async function loadGallery() {
            try {
                const res = await fetch(`${API_BASE}/gallery`);
                const result = await res.json();
                if (result.status === 'success') {
                    const items = result.data;
                    if (items.length === 0) {
                        document.getElementById('galleryList').innerHTML = '<p class="empty-state">No items. Click "+ Add New"!</p>';
                    } else {
                        document.getElementById('galleryList').innerHTML = items.map(item => `
                            <div class="grid-item">
                                <div class="grid-item-image">
                                    ${item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.title}" onerror="this.parentElement.innerHTML='No Image'">` : 'No Image'}
                                </div>
                                <div class="grid-item-title">${item.title}</div>
                                <div class="grid-item-meta">${item.category}</div>
                                <div class="grid-item-actions">
                                    <button class="btn btn-danger btn-sm" onclick="deleteGalleryItem('${item.id}')">Delete</button>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) { console.error(error); }
        }

        function openGalleryModal() {
            document.getElementById('galleryId').value = '';
            document.getElementById('galleryTitle').value = '';
            document.getElementById('galleryCategory').value = '';
            document.getElementById('galleryImage').value = '';
            openModal('galleryModal');
        }

        async function saveGalleryItem(e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('galleryTitle').value,
                category: document.getElementById('galleryCategory').value,
                imageUrl: document.getElementById('galleryImage').value
            };
            try {
                await fetch(`${API_BASE}/gallery`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showToast('Gallery item added!');
                closeModal('galleryModal');
                loadGallery();
            } catch (error) { showToast('Error saving', 'error'); }
        }

        async function deleteGalleryItem(id) {
            if (confirm('Delete this gallery item?')) {
                try {
                    await fetch(`${API_BASE}/gallery/${id}`, { method: 'DELETE' });
                    showToast('Deleted');
                    loadGallery();
                } catch (error) { showToast('Error deleting', 'error'); }
            }
        }

        // Services
        async function loadServices() {
            try {
                const res = await fetch(`${API_BASE}/services`);
                const result = await res.json();
                if (result.status === 'success') {
                    const services = result.data;
                    if (services.length === 0) {
                        document.getElementById('servicesList').innerHTML = '<tr><td colspan="3" class="empty-state">No services</td></tr>';
                    } else {
                        document.getElementById('servicesList').innerHTML = services.map(s => `
                            <tr>
                                <td>${s.icon}</td>
                                <td>${s.title || s.name}</td>
                                <td><button class="btn btn-danger btn-sm" onclick="deleteService('${s.id}')">Delete</button></td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) { console.error(error); }
        }

        function openServiceModal() {
            document.getElementById('serviceId').value = '';
            document.getElementById('serviceName').value = '';
            document.getElementById('serviceIcon').value = '👗';
            document.getElementById('serviceDesc').value = '';
            openModal('serviceModal');
        }

        async function saveService(e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('serviceName').value,
                icon: document.getElementById('serviceIcon').value,
                description: document.getElementById('serviceDesc').value
            };
            try {
                await fetch(`${API_BASE}/services`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showToast('Service added!');
                closeModal('serviceModal');
                loadServices();
            } catch (error) { showToast('Error saving', 'error'); }
        }

        async function deleteService(id) {
            if (confirm('Delete this service?')) {
                try {
                    await fetch(`${API_BASE}/services/${id}`, { method: 'DELETE' });
                    showToast('Deleted');
                    loadServices();
                } catch (error) { showToast('Error deleting', 'error'); }
            }
        }

        // Testimonials
        async function loadTestimonials() {
            try {
                const res = await fetch(`${API_BASE}/testimonials`);
                const result = await res.json();
                if (result.status === 'success') {
                    const testimonials = result.data;
                    if (testimonials.length === 0) {
                        document.getElementById('testimonialsList').innerHTML = '<tr><td colspan="3" class="empty-state">No testimonials</td></tr>';
                    } else {
                        document.getElementById('testimonialsList').innerHTML = testimonials.map(t => `
                            <tr>
                                <td>${t.name}</td>
                                <td>${t.text ? t.text.substring(0, 50) + '...' : '-'}</td>
                                <td><button class="btn btn-danger btn-sm" onclick="deleteTestimonial('${t.id}')">Delete</button></td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) { console.error(error); }
        }

        function openTestimonialModal() {
            document.getElementById('testimonialId').value = '';
            document.getElementById('testimonialName').value = '';
            document.getElementById('testimonialText').value = '';
            document.getElementById('testimonialRating').value = '5';
            openModal('testimonialModal');
        }

        async function saveTestimonial(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('testimonialName').value,
                text: document.getElementById('testimonialText').value,
                rating: parseInt(document.getElementById('testimonialRating').value)
            };
            try {
                await fetch(`${API_BASE}/testimonials`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showToast('Testimonial added!');
                closeModal('testimonialModal');
                loadTestimonials();
            } catch (error) { showToast('Error saving', 'error'); }
        }

        async function deleteTestimonial(id) {
            if (confirm('Delete this testimonial?')) {
                try {
                    await fetch(`${API_BASE}/testimonials/${id}`, { method: 'DELETE' });
                    showToast('Deleted');
                    loadTestimonials();
                } catch (error) { showToast('Error deleting', 'error'); }
            }
        }

        loadDashboard();
    </script>
</body>

</html>
